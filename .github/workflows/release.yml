name: Release

on:
  workflow_dispatch:
    inputs:
      force_publish:
        description: 'Force npm publish and CDN deploy even if no new release was detected (use to recover from a failed publish)'
        type: boolean
        default: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  pages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (IIFE + CSS + ESM + all-in-one)
        run: pnpm build

      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          branches: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve publish version
        id: version
        if: steps.semantic.outputs.new_release_published == 'true' || inputs.force_publish == 'true'
        run: |
          VERSION="${{ steps.semantic.outputs.new_release_version }}"
          if [ -z "$VERSION" ]; then
            VERSION=$(node -p "require('./package.json').version")
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Publish to npm (OIDC Trusted Publishing)
        if: steps.semantic.outputs.new_release_published == 'true' || inputs.force_publish == 'true'
        run: npm publish --provenance --access public

      - name: Prepare CDN directory
        if: steps.semantic.outputs.new_release_published == 'true' || inputs.force_publish == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p cdn/v${VERSION} cdn/latest

          # Copy dist artifacts into versioned and latest directories
          cp dist/structured-widget-editor.iife.js cdn/v${VERSION}/
          cp dist/structured-widget-editor.js      cdn/v${VERSION}/
          cp dist/structured-widget-editor.css     cdn/v${VERSION}/
          cp dist/structured-widget-editor.esm.js  cdn/v${VERSION}/

          cp dist/structured-widget-editor.iife.js cdn/latest/
          cp dist/structured-widget-editor.js      cdn/latest/
          cp dist/structured-widget-editor.css     cdn/latest/
          cp dist/structured-widget-editor.esm.js  cdn/latest/

      - name: Deploy to GitHub Pages
        if: steps.semantic.outputs.new_release_published == 'true' || inputs.force_publish == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./cdn
          keep_files: true
