<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Structured Widget Editor – IIFE Example</title>
  <style>
    .ico { display: inline-block; width: 14px; height: 14px; vertical-align: -2px; }
    .ico svg { width: 100%; height: 100%; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    :root {
      --body-bg: #fff;
      --body-fg: #333;
      --body-quiet-color: #666;
      --border-color: #ccc;
      --hairline-color: #ddd;
      --primary: #417690;
      --error-fg: #ba2121;
      --darkened-bg: #f8f8f8;
      --selected-bg: #e4e4e4;
      --object-tools-bg: #417690;
      --object-tools-fg: #fff;
      --object-tools-hover-bg: #205067;
      --delete-button-bg: #ba2121;
      --delete-button-fg: #fff;
    }

    * { box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: #f5f5f5;
      color: var(--body-fg);
      margin: 0;
      padding: 0;
    }

    .app-header {
      background: var(--object-tools-bg);
      color: #fff;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .app-header h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 600;
    }

    .app-header .subtitle {
      opacity: 0.75;
      font-size: 14px;
    }

    .app-header .mode-badge {
      background: #e8a735;
      color: #333;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .app-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      max-width: 1400px;
      margin: 24px auto;
      padding: 0 24px;
    }

    @media (max-width: 900px) {
      .app-layout { grid-template-columns: 1fr; }
    }

    .panel {
      background: #fff;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      overflow: hidden;
    }

    .panel-header {
      background: var(--darkened-bg);
      border-bottom: 1px solid var(--hairline-color);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .panel-header h2 {
      margin: 0;
      font-size: 15px;
      font-weight: 600;
    }

    .panel-body {
      padding: 16px;
    }

    .panel-body pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-all;
      font-size: 13px;
      line-height: 1.5;
      max-height: 600px;
      overflow-y: auto;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--object-tools-hover-bg);
    }

    .btn-danger {
      background: var(--delete-button-bg);
      color: #fff;
    }

    .btn-danger:hover {
      background: #a01c1c;
    }

    .btn-outline {
      background: #fff;
      color: var(--primary);
      border: 1px solid var(--primary);
    }

    .btn-outline:hover {
      background: var(--darkened-bg);
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .validation-result {
      margin-top: 12px;
      padding: 12px;
      border-radius: 4px;
      font-size: 13px;
    }

    .validation-result.valid {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .validation-result.invalid {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .validation-result ul {
      margin: 8px 0 0 0;
      padding-left: 20px;
    }

    .validation-result li {
      margin: 2px 0;
    }

    .status-bar {
      background: var(--darkened-bg);
      border-top: 1px solid var(--hairline-color);
      padding: 8px 16px;
      font-size: 12px;
      color: var(--body-quiet-color);
    }

    #output-json {
      background: #1e1e1e;
      color: #d4d4d4;
      padding: 16px;
      border-radius: 4px;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    }

    .nav-link {
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      font-size: 13px;
      margin-left: auto;
    }

    .nav-link:hover {
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="app-header">
    <span class="ico"><svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></span>
    <div>
      <h1>Structured Widget Editor</h1>
      <div class="subtitle">IIFE bundle – Custom Element mode</div>
    </div>
    <span class="mode-badge">IIFE</span>
    <a href="/" class="nav-link"><span class="ico"><svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></span> ESM example</a>
  </div>

  <div class="app-layout">
    <!-- Left panel: Form -->
    <div class="panel">
      <div class="panel-header">
        <h2><span class="ico"><svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></span>&nbsp; Book Editor</h2>
        <div class="actions">
          <button class="btn btn-outline" id="btn-sample">
            <span class="ico"><svg viewBox="0 0 24 24"><path d="M12 2v6l3-3M12 8l-3-3"/><rect x="3" y="11" width="18" height="10" rx="2"/></svg></span> Load Sample
          </button>
          <button class="btn btn-danger" id="btn-reset">
            <span class="ico"><svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 105.64-11.36L1 10"/></svg></span> Reset
          </button>
        </div>
      </div>
      <div class="panel-body" id="form-container">
        <!-- <schema-form> custom element will be inserted here -->
      </div>
    </div>

    <!-- Right panel: Output -->
    <div class="panel">
      <div class="panel-header">
        <h2><span class="ico"><svg viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg></span>&nbsp; JSON Output</h2>
        <div class="actions">
          <button class="btn btn-primary" id="btn-validate">
            <span class="ico"><svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></span> Validate
          </button>
          <button class="btn btn-outline" id="btn-copy">
            <span class="ico"><svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg></span> Copy
          </button>
        </div>
      </div>
      <div class="panel-body">
        <pre id="output-json">{}</pre>
        <div id="validation-result" style="display:none"></div>
      </div>
      <div class="status-bar" id="status-bar">Ready</div>
    </div>
  </div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <!-- Load the IIFE bundle (includes Vue + CSS) -->
  <script src="/dist/structured-widget-editor.iife.js"></script>
  <script>
    // -----------------------------------------------------------------------
    // Register the <schema-form> custom element from the IIFE global
    // -----------------------------------------------------------------------
    StructuredWidgetEditor.registerCustomElement('schema-form');

    // -----------------------------------------------------------------------
    // Custom editor example (render-function style, no template compiler needed)
    // Overrides the built-in NumberEditor for the "price" field with a
    // combined number input + range slider that shows a currency prefix.
    // -----------------------------------------------------------------------
    var h = Vue.h;
    var defineComponent = Vue.defineComponent;

    var PriceEditor = defineComponent({
      name: 'PriceEditor',
      props: {
        schema:     { type: Object, required: true },
        modelValue: { default: 0 },
        path:       { type: Array,  default: function() { return []; } },
        form:       { type: Object, default: null },
      },
      emits: ['update:modelValue'],
      setup: function(props, ctx) {
        function onInput(e) {
          ctx.emit('update:modelValue', parseFloat(e.target.value) || 0);
        }
        return function() {
          var errors = props.form && props.form.getErrorsForPath ? props.form.getErrorsForPath(props.path) : [];
          return h('div', { class: ['sf-field', errors.length ? 'errors' : ''] }, [
            h('label', { class: 'sf-label' }, props.schema.title || 'Price'),
            h('div', { style: 'display:flex;align-items:center;gap:10px' }, [
              h('span', { style: 'font-weight:600;color:var(--body-quiet-color)' }, '€'),
              h('input', {
                type: 'number',
                class: 'sf-input',
                step: '0.01',
                min: props.schema.minimum != null ? String(props.schema.minimum) : undefined,
                value: props.modelValue,
                onInput: onInput,
                style: 'max-width:100px',
              }),
              h('input', {
                type: 'range',
                min: props.schema.minimum != null ? String(props.schema.minimum) : '0',
                max: props.schema.maximum != null ? String(props.schema.maximum) : '200',
                step: '0.01',
                value: props.modelValue,
                onInput: onInput,
                style: 'flex:1',
              }),
              h('span', { style: 'font-size:13px;color:var(--body-quiet-color);min-width:48px;text-align:right' },
                '€ ' + (props.modelValue || 0).toFixed(2)
              ),
            ]),
            errors.length ? h('ul', { class: 'errorlist' },
              errors.map(function(err, i) { return h('li', { key: i }, err); })
            ) : null,
          ]);
        };
      },
    });

    // -----------------------------------------------------------------------
    // Sample data
    // -----------------------------------------------------------------------
    var sampleData = {
      title: 'One Hundred Years of Solitude',
      isbn: '978-0-06-088328-7',
      description: 'The multi-generational story of the Buendía family in the fictional town of Macondo.',
      pages: 417,
      price: 14.99,
      published: true,
      status: 'published',
      language: 'es',
      main_author: { id: 1, name: 'Gabriel García Márquez', model: 'library.Author' },
      co_authors: [],
      publisher: { id: 3, name: 'Editorial Sudamericana', model: 'library.Publisher' },
      categories: [
        { id: 7, name: 'Historical Fiction', model: 'library.Category' },
        { id: 8, name: 'Literary Fiction', model: 'library.Category' },
      ],
      notes: 'Winner of the Nobel Prize in Literature (1982).',
      chapters: [
        { title: 'Chapter I', pages: 24 },
        { title: 'Chapter II', pages: 31 },
        { title: 'Chapter III', pages: 28 },
      ],
      format: {
        format_type: 'physical',
        weight_grams: 340,
        dimensions: '20.3 x 13.3 x 2.3 cm',
      },
    };

    // -----------------------------------------------------------------------
    // State
    // -----------------------------------------------------------------------
    var currentValue = null;
    var formEl = document.createElement('schema-form');

    formEl.customEditors = [
      { match: function(schema, path) { return path[path.length - 1] === 'price'; }, component: PriceEditor },
    ];

    document.getElementById('form-container').appendChild(formEl);

    // Fetch schema from the mock API and apply it
    fetch('/api/schema')
      .then(function (r) { return r.json(); })
      .then(function (schema) {
        formEl.schema = schema;
        console.log('Schema loaded and applied to form:', schema);
      });

    // Listen for changes via the custom element event
    formEl.addEventListener('change', function (e) {
      currentValue = e.detail[0];
      document.getElementById('output-json').textContent = JSON.stringify(currentValue, null, 2);
      document.getElementById('status-bar').textContent = 'Updated at ' + new Date().toLocaleTimeString();
    });

    // -----------------------------------------------------------------------
    // Button handlers
    // -----------------------------------------------------------------------
    document.getElementById('btn-sample').addEventListener('click', function () {
      formEl.initialData = JSON.parse(JSON.stringify(sampleData));
      currentValue = JSON.parse(JSON.stringify(sampleData));
      document.getElementById('output-json').textContent = JSON.stringify(currentValue, null, 2);
      document.getElementById('status-bar').textContent = 'Sample data loaded';
      hideValidation();
    });

    document.getElementById('btn-reset').addEventListener('click', function () {
      formEl.initialData = {};
      currentValue = {};
      document.getElementById('output-json').textContent = '{}';
      document.getElementById('status-bar').textContent = 'Form reset';
      hideValidation();
    });

    document.getElementById('btn-validate').addEventListener('click', function () {
      if (!currentValue) {
        showValidation(false, { _root: ['No data to validate.'] });
        return;
      }
      fetch('/api/validate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(currentValue),
      })
        .then(function (r) { return r.json(); })
        .then(function (result) {
          showValidation(result.valid, result.errors || {});
          formEl.errors = result.valid ? {} : (result.errors || {});
          document.getElementById('status-bar').textContent = result.valid ? 'Validation passed' : 'Validation failed';
        })
        .catch(function (err) {
          showValidation(false, { _root: [err.message] });
          document.getElementById('status-bar').textContent = 'Validation error';
        });
    });

    document.getElementById('btn-copy').addEventListener('click', function () {
      var text = document.getElementById('output-json').textContent;
      navigator.clipboard.writeText(text);
      document.getElementById('status-bar').textContent = 'Copied to clipboard';
    });

    // -----------------------------------------------------------------------
    // Validation display helpers
    // -----------------------------------------------------------------------
    function showValidation(valid, errors) {
      var el = document.getElementById('validation-result');
      el.style.display = 'block';
      if (valid) {
        el.className = 'validation-result valid';
        el.innerHTML = '<span class="ico"><svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></span> Data is valid!';
      } else {
        el.className = 'validation-result invalid';
        var html = '<span class="ico"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></span> <strong>Validation failed</strong><ul>';
        for (var path in errors) {
          var msgs = errors[path];
          html += '<li><strong>' + escapeHtml(path) + '</strong>: ' + msgs.map(escapeHtml).join(', ') + '</li>';
        }
        html += '</ul>';
        el.innerHTML = html;
      }
    }

    function hideValidation() {
      document.getElementById('validation-result').style.display = 'none';
    }

    function escapeHtml(str) {
      var div = document.createElement('div');
      div.appendChild(document.createTextNode(str));
      return div.innerHTML;
    }
  </script>
</body>
</html>
